<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Volunteer / Donate - Philippine Red Cross</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About Us</a></li>
        <li><a href="programs.html">Programs</a></li>
        <li><a href="events.html">Events</a></li>
        <li><a href="volunteer.html">Volunteer / Donate</a></li>
      </ul>
    </nav>
  </header>

  <section class="volunteer-donate">
    <h1>Get Involved</h1>

    <!-- Volunteer Form -->
    <h2>Volunteer Registration</h2>
    <form id="volunteer-form">
      <label for="name">Name:</label>
      <input type="text" id="name" required>

      <label for="email">Email:</label>
      <input type="email" id="email" required>

      <label for="service">Preferred Service Area:</label>
      <select id="service" required>
        <option value="blood-donation">Blood Donation</option>
        <option value="disaster-relief">Disaster Relief</option>
        <option value="health-services">Health Services</option>
      </select>

      <button type="submit">Submit</button>
    </form>

    <!-- Donation Form -->
    <h2>Make a Donation</h2>
    <form id="donation-form">
      <label for="amount">Donation Amount:</label>
      <input type="number" id="amount" required>

      <label for="payment-method">Payment Method:</label>
      <select id="payment-method" required>
        <option value="credit-card">Credit Card</option>
        <option value="paypal">PayPal</option>
      </select>

      <button type="submit">Donate</button>
    </form>
  </section>

  <footer>
    <p>&copy; 2026 Philippine Red Cross</p>
  </footer>
</body>
</html>
