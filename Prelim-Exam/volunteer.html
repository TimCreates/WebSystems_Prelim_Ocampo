<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Volunteer / Donate - Philippine Red Cross</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Navbar -->
  <header>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About Us</a></li>
        <li><a href="programs.html">Programs</a></li>
        <li><a href="volunteer.html" class="active">Volunteer / Donate</a></li>
      </ul>
    </nav>
  </header>

  <!-- Volunteer Section -->
  <section class="volunteer">
    <h1>Become a Volunteer</h1>
    <p>Join us in making a difference by volunteering your time and skills to our cause.</p>

    <!-- Volunteer Form -->
    <form id="volunteer-form">
      <div>
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" required>
      </div>
      <div>
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required>
      </div>
      <div>
        <label for="service">Preferred Service</label>
        <select id="service" name="service" required>
          <option value="">Select a Service</option>
          <option value="Blood Donation">Blood Donation</option>
          <option value="Disaster Relief">Disaster Relief</option>
          <option value="Health Services">Health Services</option>
        </select>
      </div>
      <button type="submit">Register as Volunteer</button>
    </form>

    <!-- Donation Section -->
    <div class="donate">
      <h2>Make a Donation</h2>
      <p>Your contribution can help provide essential services to those in need.</p>
      <form id="donation-form">
        <label for="amount">Donation Amount ($)</label>
        <input type="number" id="amount" name="amount" required>
        <button type="submit">Donate Now</button>
      </form>
    </div>
  </section>

  <footer>
    <p>&copy; 2026 Philippine Red Cross</p>
  </footer>

  <script src="volunteer.js"></script> <!-- Your JavaScript for form validation -->
</body>
</html>
